version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: analyst_lens_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-analyst}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-analyst_lens}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-analyst}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analyst_lens_api
    environment:
      AL_DATABASE_URL: ${AL_DATABASE_URL}
      AL_SECRET_KEY: ${AL_SECRET_KEY}
      AL_ACCESS_TOKEN_EXPIRE_MINUTES: ${AL_ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      AL_AI_MODE: ${AL_AI_MODE:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    # Additional security
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: analyst_lens_frontend
    environment:
      API_BASE_URL: http://api:8000
      STREAMLIT_SERVER_HEADLESS: true
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Streamlit specific configuration
    volumes:
      - ~/.streamlit:/home/appuser/.streamlit:ro
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
    driver: local

