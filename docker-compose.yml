services:
  db:
    image: postgres:16-alpine
    container_name: analyst_lens_db
    environment:
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst
      POSTGRES_DB: analyst_lens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst -d analyst_lens"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analyst_lens_api
    environment:
      AL_DATABASE_URL: postgresql://analyst:analyst@db:5432/analyst_lens
      AL_SECRET_KEY: "${AL_SECRET_KEY:-dev_secret_key_change_me}"
      AL_AI_MODE: "${AL_AI_MODE:-mock}"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: ["uvicorn", "app.main:get_app", "--factory", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: analyst_lens_frontend
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  pgdata:

